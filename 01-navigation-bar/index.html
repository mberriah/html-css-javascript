<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="styles.css" />
  <title>Navigation Bar</title>
</head>

<body>
  <nav class="icon-bar" aria-label="Primary">
    <a class="icon-link is-active" href="#" aria-current="page" aria-label="Home">
      <i class="fa fa-home" aria-hidden="true"></i>
      <span class="sr-only">Home</span>
    </a>

    <a class="icon-link" href="#" aria-label="Search">
      <i class="fa fa-search" aria-hidden="true"></i>
      <span class="sr-only">Search</span>
    </a>

    <a class="icon-link" href="#" aria-label="Messages">
      <i class="fa fa-envelope" aria-hidden="true"></i>
      <span class="sr-only">Messages</span>
    </a>

    <a class="icon-link" href="#" aria-label="World">
      <i class="fa fa-globe" aria-hidden="true"></i>
      <span class="sr-only">World</span>
    </a>

    <a class="icon-link" href="#" aria-label="Trash">
      <i class="fa fa-trash" aria-hidden="true"></i>
      <span class="sr-only">Trash</span>
    </a>
  </nav>
</body>
</html>
